<div class="container mt-5">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <div class="card shadow-lg">
    
    <div class="card-header bg-primary text-white">
      <h4 class="mb-0">
        {{ isEditMode ? 'Edit User' : 'Add User' }}
      </h4>
    </div>

    <div class="card-body">

      <form #userForm="ngForm" (ngSubmit)="saveUser(userForm)">

        <div class="row">

          <div class="col-md-6 mb-3">
            <label>First Name</label>
            <input type="text" name="firstName"
                   [(ngModel)]="user.firstName"
                   #firstName="ngModel"
                   required minlength="4"
                   class="form-control">

            <div *ngIf="firstName.invalid && (firstName.touched || userForm.submitted)" class="text-danger">
              <small>First Name required (min 3 chars)</small>
            </div>
          </div>

          <div class="col-md-6 mb-3">
            <label>Last Name</label>
            <input type="text" name="lastName"
                   [(ngModel)]="user.lastName"
                   #lastName="ngModel"
                   required
                   class="form-control">

            <div *ngIf="lastName.invalid && (lastName.touched || userForm.submitted)" class="text-danger">
              <small>Last Name required</small>
            </div>
          </div>

          <div class="col-md-6 mb-3">
            <label>Email</label>
            <input type="email" name="email"
                   [(ngModel)]="user.email"
                   #email="ngModel"
                   required email
                   class="form-control">

            <div *ngIf="email.invalid && (email.touched || userForm.submitted)" class="text-danger">
              <small>Enter valid email</small>
            </div>
          </div>

 
          <div class="col-md-6 mb-3">
            <label>Password</label>
            <input type="password" name="password"
                   [(ngModel)]="user.password"
                   #password="ngModel"
                   [required]="!isEditMode"
                   minlength="6"
                   class="form-control">

            <div *ngIf="password.invalid && (password.touched || userForm.submitted)" class="text-danger">
              <small>Password min 6 characters</small>
            </div>
          </div>

          <div class="col-md-6 mb-3">
            <label>Date of Birth</label>
            <input type="date" name="dateOfBirth"
                   [(ngModel)]="user.dateOfBirth"
                   #dob="ngModel"
                   required
                   class="form-control">

            <div *ngIf="dob.invalid && (dob.touched || userForm.submitted)" class="text-danger">
              <small>DOB required</small>
            </div>
          </div>


          <div class="col-md-6 mb-3">
            <label>Age</label>
            <input type="number" name="age"
                   [(ngModel)]="user.age"
                   readonly
                   class="form-control">
          </div>

      
          <div class="col-md-6 mb-3">
            <label>Gender</label>
            <select name="gender"
                    [(ngModel)]="user.gender"
                    #gender="ngModel"
                    required
                    class="form-select">

              <option value="">Select Gender</option>
              <option>Male</option>
              <option>Female</option>
            </select>

            <div *ngIf="gender.invalid && (gender.touched || userForm.submitted)" class="text-danger">
              <small>Select gender</small>
            </div>
          </div>

          
          <div class="col-md-6 mb-3">
            <label>Country</label>
            <input type="text" name="country"
                   [(ngModel)]="user.country"
                   #country="ngModel"
                   required
                   class="form-control">

            <div *ngIf="country.invalid && (country.touched || userForm.submitted)" class="text-danger">
              <small>Country required</small>
            </div>
          </div>

         
          <div class="col-12 mb-3">
            <label>Address</label>
            <textarea name="address"
                      [(ngModel)]="user.address"
                      #address="ngModel"
                      required
                      class="form-control"></textarea>

            <div *ngIf="address.invalid && (address.touched || userForm.submitted)" class="text-danger">
              <small>Address required</small>
            </div>
          </div>

        
          <div class="col-12 mb-3 form-check">
            <input type="checkbox"
                   name="termsAccepted"
                   [(ngModel)]="user.termsAccepted"
                   #terms="ngModel"
                   required
                   class="form-check-input">

            <label class="form-check-label">
              Accept Terms & Conditions
            </label>

            <div *ngIf="terms.invalid && (terms.touched || userForm.submitted)" class="text-danger">
              <small>You must accept terms</small>
            </div>
          </div>

        </div>

      
        <div class="text-end">
          <button class="btn btn-success me-2" type="submit">
            Save
          </button>

          <button class="btn btn-secondary" type="button" (click)="cancel()">
            Cancel
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
